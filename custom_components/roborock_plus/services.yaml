get_maps:
  name: Get maps
  description: Retrieves the map and room information of your device.
  target:
    entity:
      integration: roborock_plus
      domain: vacuum
set_vacuum_goto_position:
  name: Go to position
  description: Sends the vacuum to a specific position.
  target:
    entity:
      integration: roborock_plus
      domain: vacuum
  fields:
    x:
      example: 27500
      required: true
      selector:
        text:
          type: number
    y:
      example: 32000
      required: true
      selector:
        text:
          type: number
get_vacuum_current_position:
  name: Get current position
  description: Retrieves the current position of the vacuum.
  target:
    entity:
      integration: roborock_plus
      domain: vacuum
get_dock_position:
  name: Get dock position
  description: Retrieves the dock reference position used by Roborock Plus.
  target:
    entity:
      integration: roborock_plus
      domain: vacuum
get_safe_zone:
  name: Get danger zone
  description: Retrieves the saved danger zone for the selected vacuum.
  target:
    entity:
      integration: roborock_plus
      domain: vacuum
get_safe_zone_editor_context:
  name: Get danger zone editor context
  description: Retrieves map image, calibration, current position, and saved danger zone for the editor.
  target:
    entity:
      integration: roborock_plus
      domain: vacuum
get_safe_zone_suggestion:
  name: Get danger zone suggestion
  description: Calculates a suggested danger zone from the dock position and cabinet direction.
  target:
    entity:
      integration: roborock_plus
      domain: vacuum
  fields:
    cabinet_direction:
      name: Cabinet direction
      description: "Direction the vacuum exits the cabinet: north, south, east, or west."
      required: true
      selector:
        select:
          options:
            - north
            - south
            - east
            - west
    safe_distance_front:
      name: Safe distance front
      description: Distance in map units from the dock used to calculate the danger zone.
      required: true
      selector:
        text:
          type: number
    safe_half_width:
      name: Safe half width
      description: Half width of the danger zone in map units.
      required: true
      selector:
        text:
          type: number
    close_margin:
      name: Close margin
      description: Extra conservative margin in map units.
      required: true
      selector:
        text:
          type: number
resume_task:
  name: Resume task
  description: Resumes the current paused cleaning or docking task.
  target:
    entity:
      integration: roborock_plus
      domain: vacuum
set_safe_zone:
  name: Set danger zone
  description: Saves a manual danger zone rectangle for the selected vacuum.
  target:
    entity:
      integration: roborock_plus
      domain: vacuum
  fields:
    min_x:
      name: Min X
      required: true
      selector:
        text:
          type: number
    max_x:
      name: Max X
      required: true
      selector:
        text:
          type: number
    min_y:
      name: Min Y
      required: true
      selector:
        text:
          type: number
    max_y:
      name: Max Y
      required: true
      selector:
        text:
          type: number
clear_safe_zone:
  name: Clear danger zone
  description: Removes the saved danger zone for the selected vacuum.
  target:
    entity:
      integration: roborock_plus
      domain: vacuum
